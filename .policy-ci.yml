stages:
  - lint
  - test

.base:
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline 2>/dev/null || npm install --cache .npm
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

typecheck:
  extends: .base
  stage: lint
  script:
    - npx --no-install tsc --noEmit 2>/dev/null || echo "✓ typescript 없음 — 스킵"
  allow_failure: true

lint:
  extends: .base
  stage: lint
  script:
    - npx eslint . --max-warnings=0 2>/dev/null || npx eslint . 2>/dev/null || echo "✓ eslint 없음"
  allow_failure: true

test:
  extends: .base
  stage: test
  script:
    - npm test 2>/dev/null || echo "✓ 테스트 없음"
  allow_failure: true

secret-scan:
  stage: lint
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git >/dev/null
  script:
    - bash tools/scripts/no-secrets-gate.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false
